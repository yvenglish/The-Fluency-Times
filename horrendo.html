<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>The Fluency Times</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- HEADER -->

  <header class="topbar">

    <div class="logo-wrap">

      <div class="logo">
        YV
      </div>

      <div class="logo-sub">
        THE FLUENCY TIMES
      </div>

    </div>


    <!-- LEVEL BUTTONS -->

    <div class="level-switch">

      <button
        class="lbtn active"
        data-level="1"
      >
        Level 1
      </button>

      <button
        class="lbtn"
        data-level="2"
      >
        Level 2
      </button>

      <button
        class="lbtn"
        data-level="3"
      >
        Level 3
      </button>

    </div>

  </header>



  <!-- MAIN -->

  <main class="container">


    <!-- TITLE -->

    <h1
      class="title"
      id="newsTitle"
    >
    </h1>


    <!-- DATE -->

    <div
      class="date"
      id="newsDate"
    >
    </div>



    <!-- AUDIO CONTROLS -->

    <div class="controls">

      <button id="startBtn">
        ▶ Start
      </button>

      <button
        id="pauseBtn"
        class="secondary"
      >
        ⏸ Pause
      </button>

      <button
        id="restartBtn"
        class="secondary"
      >
        ↺ Restart
      </button>

    </div>



    <!-- NEWS -->

    <div
      class="news-text"
      id="newsText"
    >
    </div>



    <!-- QUESTIONS -->

    <section class="questions">

      <h2>
        Questions
      </h2>

      <div id="questionsContainer"></div>

    </section>


  </main>

  <script src="script.js"></script>

</body>
</html>
